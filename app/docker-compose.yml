# ─────────────────────────────────────────────
# ODI Platform — Docker Compose (Production)
# Copy .env.example to .env and fill in values
# ─────────────────────────────────────────────

services:
  db:
    image: postgres:16-alpine
    restart: always
    volumes:
      - pg_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: odi_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: odi_platform
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odi_user -d odi_platform"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - odi-network

  app:
    build: .
    restart: always
    environment:
      DATABASE_URL: postgresql://odi_user:${DB_PASSWORD:-changeme}@db:5432/odi_platform?schema=public
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-this-to-a-random-secret}
      NEXTAUTH_URL: ${APP_URL:-http://localhost}
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - odi-network

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - app
    networks:
      - odi-network

volumes:
  pg_data:

networks:
  odi-network:
    driver: bridge
