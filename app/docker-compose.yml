# ─────────────────────────────────────────────
# ODI Platform — Docker Compose (Production)
# Set values in a .env file next to this file:
#   DB_PASSWORD=<strong password>
#   NEXTAUTH_SECRET=<openssl rand -hex 32>
#   APP_URL=http://<server-ip>:3010
#   APP_PORT=3010
# ─────────────────────────────────────────────

services:
  db:
    image: postgres:16-alpine
    container_name: odi-db
    restart: always
    volumes:
      - pg_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: odi_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: odi_platform
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odi_user -d odi_platform"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - odi-network

  app:
    build: .
    image: odi-platform
    container_name: odi-app
    restart: always
    environment:
      DATABASE_URL: postgresql://odi_user:${DB_PASSWORD:-changeme}@db:5432/odi_platform?schema=public
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-this-to-a-random-secret}
      NEXTAUTH_URL: ${APP_URL:-http://localhost:3010}
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@odifirm.com}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-Admin@123}
      SEED_ADMIN_NAME: ${SEED_ADMIN_NAME:-Admin}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3010}:3000"
    networks:
      - odi-network

volumes:
  pg_data:

networks:
  odi-network:
    driver: bridge
